<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willems Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050509;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
        }

        body {
            font-family: 'Segoe UI', Helvetica, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Invoervelden bovenin */
        .controls {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #000;
            color: white;
            font-size: 1rem;
        }

        .add-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* De klokken grid */
        #clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .clock-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            border-top: 4px solid var(--accent);
            transition: transform 0.3s;
        }

        .clock-card:hover { transform: translateY(-5px); }

        .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .card-emoji { font-size: 1.8rem; }
        .card-title { font-size: 1.2rem; font-weight: bold; flex-grow: 1; text-transform: uppercase; }

        /* De cijfers */
        .time-display { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .time-unit { text-align: center; flex: 1; }
        .digits { display: block; font-size: 2.2rem; font-weight: 800; color: var(--accent); font-family: monospace; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        /* Knoppen op de kaart */
        .actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; }

        .status-bar {
            text-align: center;
            font-size: 0.8rem;
            padding-top: 15px;
            border-top: 1px solid var(--glass-border);
            color: #666;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Willems Dashboard</h1>

    <div class="controls">
        <input type="text" id="emojiInput" placeholder="🚀" style="width: 50px; text-align:center;">
        <input type="text" id="titleInput" placeholder="Naam van de klok">
        <input type="datetime-local" id="dateInput">
        <button class="add-btn" onclick="addClock()">TOEVOEGEN</button>
    </div>

    <div id="clock-grid"></div>
