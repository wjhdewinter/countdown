<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willems Ultimate Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050509;
            background-image: radial-gradient(circle at top right, #1a1a2e, #050509);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; }

        /* Bedieningspaneel */
        .controls {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, select {
            background: rgba(0,0,0,0.4);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .add-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover { transform: scale(1.05); background: white; }

        /* Klokken Kaarten */
        #clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .clock-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .emoji { font-size: 2rem; }
        .title { font-size: 1.3rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .countdown { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .unit { text-align: center; }
        .val { display: block; font-size: 2.2rem; font-weight: 800; color: var(--accent); font-family: monospace; }
        .lab { font-size: 0.7rem; color: #888; text-transform: uppercase; }

        .card-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-small { background: none; border: none; cursor: pointer; font-size: 1.2rem; filter: grayscale(1); transition: 0.2s; }
        .btn-small:hover { filter: grayscale(0); transform: scale(1.2); }

        .footer-status {
            text-align: center;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>WILLEMS DASHBOARD</h1>

    <div class="controls">
        <input type="text" id="eIn" placeholder="🚀" style="width: 50px; text-align: center;">
        <input type="text" id="tIn" placeholder="Naam van gebeurtenis">
        <input type="datetime-local" id="dIn">
        <button class="add-btn" onclick="add()">TOEVOEGEN</button>
    </div>

    <div id="clock-grid"></div>

<script>
    let clocks = JSON.parse(localStorage.getItem('willem_v4')) || [];

    // Check voor gedeelde WhatsApp link
    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if (p.has('t')) {
            const shared = {
                id: Date.now(),
                e: p.get('e') || '📅',
                t: decodeURIComponent(p.get('t')),
                d: parseInt(p.get('d')),
                done: false
            };
            if (!clocks.find(c => c.d === shared.d && c.t === shared.t)) {
                clocks.push(shared);
                save();
            }
            window.history.replaceState({}, '', window.location.pathname);
        }
        render();
    };

    function save() { localStorage.setItem('willem_v4', JSON.stringify(clocks)); }

    function add() {
        const t = document.getElementById('tIn').value;
        const d = document.getElementById('dIn').value;
        const e = document.getElementById('eIn').value || '📅';

        if (!t || !d) return alert("Vul een naam en datum in!");

        clocks.push({ id: Date.now(), e, t, d: new Date(d).getTime(), done: false });
        save(); render();
        document.getElementById('tIn').value = '';
    }

    function del(id) {
        clocks = clocks.filter(c => c.id !== id);
        save(); render();
    }

    function share(id) {
        const c = clocks.find(x => x.id === id);
        const url = `${window.location.origin}${window.location.pathname}?t=${encodeURIComponent(c.t)}&d=${c.d}&e=${encodeURIComponent(c.e)}`;
        const text = `Willem deelt een klok met je: ${c.e} ${c.t}! Kijk live mee: ${url}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function render() {
        const g = document.getElementById('clock-grid');
        g.innerHTML = '';
        clocks.forEach(c => {
            g.innerHTML += `
                <div class="clock-card" id="c-${c.id}">
                    <div class="card-actions">
                        <button class="btn-small" onclick="share(${c.id})">🟢</button>
                        <button class="btn-small" onclick="del(${c.id})">❌</button>
                    </div>
                    <div class="card-header">
                        <span class="emoji">${c.e}</span>
                        <span class="title">${c.t}</span>
                    </div>
                    <div class="countdown">
                        <div class="unit"><span class="val" id="days
