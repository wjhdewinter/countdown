<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willems Ultimate Countdowns</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #050509;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .controls {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(0,0,0,0.5);
            color: white;
        }

        .add-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .add-btn:hover { transform: scale(1.05); }

        #clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .clock-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            transition: all 0.3s ease;
        }

        /* Thema Kleuren */
        .glow-blue { border-top: 3px solid #00d2ff; }
        .glow-red { border-top: 3px solid #ff4444; }
        .glow-green { border-top: 3px solid #00ff88; }
        .glow-gold { border-top: 3px solid #ffcc00; }

        /* Pulsatie bij bijna klaar */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        .urgent { animation: pulse 1.5s infinite; border-top-color: #ff4444 !important; }

        .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .card-emoji { font-size: 1.5rem; }
        .card-title { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; flex-grow: 1; }

        .time-display { display: flex; justify-content: space-between; margin-top: 15px; }
        .time-unit { text-align: center; flex: 1; }
        .digits { display: block; font-size: 2rem; font-weight: 800; font-family: monospace; }
        
        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        .actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            filter: grayscale(1);
            transition: 0.2s;
        }

        .action-btn:hover { filter: grayscale(0); transform: scale(1.2); }

        .status-msg {
            margin-top: 15px;
            font-size: 0.8rem;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Willems Dashboard</h1>

    <div class="controls">
        <input type="text" id="emojiInput" placeholder="🚀" style="width: 40px; text-align: center;">
        <input type="text" id="titleInput" placeholder="Wat vieren we?">
        <input type="datetime-local" id="dateInput">
        <select id="colorInput">
            <option value="blue">Blauw</option>
            <option value="red">Rood</option>
            <option value="green">Groen</option>
            <option value="gold">Goud</option>
        </select>
        <button class="add-btn" onclick="addClock()">Toevoegen</button>
    </div>

    <div id="clock-grid"></div>

<script>
    let clocks = JSON.parse(localStorage.getItem('ultraClocks')) || [];

    // URL link parser
    window.onload = () => {
        const p = new URLSearchParams(window.location.search);
        if (p.has('t')) {
            clocks.push({
                id: Date.now(),
                emoji: p.get('e') || '📅',
                title: decodeURIComponent(p.get('t')),
                target: parseInt(p.get('d')),
                color: p.get('c') || 'blue',
                done: false
            });
            save();
            window.history.replaceState({}, '', window.location.pathname);
            render();
        }
    };

    function addClock() {
        const title = document.getElementById('titleInput').value;
        const date = document.getElementById('dateInput').value;
        if (!title || !date) return;

        clocks.push({
            id: Date.now(),
            emoji: document.getElementById('emojiInput').value || '📅',
            title: title,
            target: new Date(date).getTime(),
            color: document.getElementById('colorInput').value,
            done: false
        });
        save(); render();
        document.getElementById('titleInput').value = '';
    }

    function deleteClock(id) {
        clocks = clocks.filter(c => c.id !== id);
        save(); render();
    }

    function shareWA(id) {
        const c = clocks.find(x => x.id === id);
        const url = `${window.location.href.split('?')[0]}?t=${encodeURIComponent(c.title)}&d=${c.target}&e=${encodeURIComponent(c.emoji)}&c=${c.color}`;
        const text = `Check deze countdown van Willem: ${c.emoji} ${c.title}! Bekijk het live: ${url}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function save() { localStorage.setItem('ultraClocks', JSON.stringify(clocks)); }

    function render() {
        const grid = document.getElementById('clock-grid');
        grid.innerHTML = '';
        clocks.forEach(c => {
            grid.innerHTML += `
                <div class="clock-card glow-${c.color}" id="card-${c.id}">
                    <div class="actions">
                        <button class="action-btn" onclick="shareWA(${c.id})">🟢</button>
                        <button class="action-btn" onclick="deleteClock(${c.id})">❌</button>
                    </div>
                    <div class="card-head">
                        <span class="card-emoji">${c.emoji}</span>
                        <span class="card-title">${c.title.toUpperCase()}</span>
                    </div>
                    <div class="time-display">
                        <div class="time-unit"><span class="digits" id="d-${c.id}">00</span><span class="label">Dagen</span></div>
                        <div class="time-unit"><span class="digits" id="h-${c.id}">00</span><span class="label">Uren</span></div>
                        <div class="time-unit"><span class="digits" id="m-${c.id}">00</span><span class="label">Min</span></div>
                        <div class="time-unit"><span class="digits" id="s-${c.id}">00</span><span class="label">Sec</span></div>
                    </div>
                    <div class="status-msg" id="status-${c.id}"></div>
                </div>
            `;
        });
    }

    function update() {
        const now = new Date().getTime();
        clocks.forEach(c => {
            const diff = c.target - now;
            const card = document.getElementById(`card-${c.id}`);
            const status = document.getElementById(`status-${c.id}`);
            if (!card) return;

            // Confetti check
            if (diff <= 0 && diff > -2000 && !c.done) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                c.done = true;
                save();
            }

            // Urgentie (laatste uur)
            if (diff > 0 && diff < 3600000) card.classList.add('urgent');
            else card.classList.remove('urgent');

            const absDiff = Math.abs(diff);
            const d = Math.floor(absDiff / 86400000);
            const h = Math.floor((absDiff % 86400000) / 3600000);
            const m = Math.floor((absDiff % 3600000) / 60000);
            const s = Math.floor((absDiff % 60000) / 1000);

            document.getElementById(`d-${c.id}`).innerText = d.toString().padStart(2, '0');
            document.getElementById(`h-${c.id}`).innerText = h.toString().padStart(2, '0');
            document.getElementById(`m-${c.id}`).innerText = m.toString().padStart(2, '0');
            document.getElementById(`s-${c.id}`).innerText = s.toString().padStart(2, '0');

            if (diff < 0) {
                status.innerText = "TIJD IS VERSTREKEN! 🎉";
                status.style.color = "#00ff88";
            } else {
                status.innerText = "NOG EVEN GEDULD...";
                status.style.color = "#666";
            }
        });
    }

    render();
    setInterval(update, 1000);
</script>
</body>
</html>
