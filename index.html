<!doctype html><html lang="nl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Final Countdown PRO</title><link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
<meta name="theme-color" content="#202020"><meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="./style.css"></head><body>
<canvas id="confettiCanvas"></canvas>
<div class="app"><header class="topbar"><button id="menuBtn" class="icon-btn">☰</button><h1>Final Countdown</h1><button id="addBtn" class="icon-btn plus">+</button></header>
<section class="intro-card"><strong>Countdowns</strong><span>Privé timers voor leuke momenten, vakanties, verjaardagen en speciale dagen.</span>
<div class="quick-actions"><button id="themeBtn" class="pill">🎨 Thema</button><button id="installBtn" class="pill install" hidden>App installeren</button></div>
<small id="installStatus">Chrome-menu ⋮ → App installeren / Toevoegen aan startscherm.</small></section><main id="countdownList" class="list"></main></div>
<dialog id="countdownDialog"><form method="dialog" id="countdownForm" class="dialog-card"><h2 id="dialogTitle">Nieuwe countdown</h2>
<label>Naam <input id="titleInput" required maxlength="40" placeholder="vakantie"></label><label>Datum <input id="dateInput" type="date" required></label>
<label>Tijd <input id="timeInput" type="time" value="16:00" required></label><label>Categorie <select id="categoryInput">
<option value="vakantie">✈️ Vakantie</option><option value="liefde">❤️ Liefde</option><option value="verjaardag">🎂 Verjaardag</option><option value="feest">🎉 Feest</option><option value="deadline">⏳ Deadline</option><option value="anders">⭐ Anders</option></select></label>
<div class="dialog-actions"><button type="button" class="ghost" id="cancelBtn">Annuleren</button><button class="primary">Opslaan</button></div></form></dialog>
<dialog id="detailDialog" class="detail-dialog"><section class="detail-page"><header class="detail-topbar"><button class="icon-btn" id="backDetailBtn">‹</button><h1>Final Countdown</h1><button class="icon-btn" id="detailEditBtn">✎</button><button class="icon-btn" id="detailShareBtn">↗</button></header><div class="detail-spacer"></div><article id="detailContent"></article></section></dialog>
<dialog id="shareDialog"><section class="dialog-card"><h2>WhatsApp delen</h2><p class="muted">Kies een stijl voor je bericht.</p><div class="share-grid"><button data-style="enthousiast" class="share-style">😄 Enthousiast</button><button data-style="romantisch" class="share-style">❤️ Romantisch</button><button data-style="grappig" class="share-style">😂 Grappig</button><button data-style="simpel" class="share-style">✅ Simpel</button></div><textarea id="shareText" rows="8"></textarea><div class="dialog-actions stack"><button id="copyShareBtn" class="ghost" type="button">Kopieer tekst</button><button id="openWhatsAppBtn" class="primary" type="button">Open WhatsApp</button><button id="closeShareBtn" class="ghost" type="button">Sluiten</button></div></section></dialog>
<dialog id="themeDialog"><section class="dialog-card"><h2>Thema kiezen</h2><div class="share-grid"><button data-theme="neon" class="share-style">🔴 Neon</button><button data-theme="minimal" class="share-style">⚫ Minimal dark</button><button data-theme="fun" class="share-style">🌈 Fun kleurrijk</button></div><button id="closeThemeBtn" class="ghost full" type="button">Sluiten</button></section></dialog>
<script src="./app.js"></script></body></html>
