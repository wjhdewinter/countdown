<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Warehouse Dashboard Willem</title>
    <style>
        :root { --geel: #eab308; --donker: #0f172a; --kaart: #1e293b; }
        body { background-color: var(--donker); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--geel); color: black; padding: 15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .docks { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; }
        .dock { background: var(--kaart); padding: 10px; border-radius: 8px; border-left: 5px solid var(--geel); display: flex; align-items: center; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 5px; border-radius: 4px; flex-grow: 1; margin-left: 10px; }
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--kaart); padding: 15px; border-radius: 10px; border-top: 4px solid var(--geel); text-align: center; }
        .num { font-size: 50px; font-weight: bold; color: var(--geel); margin: 10px 0; }
        .btn { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; margin: 2px; }
    </style>
</head>
<body>
    <header>
        <div>WH-CONTROL | HEEMSKERK</div>
        <div id="klok">00:00:00</div>
    </header>
    <div class="grid">
        <div class="docks" id="dockLijst"></div>
        <div class="sidebar">
            <div class="card">
                <div style="font-size: 12px; color: #94a3b8;">ORDERS TE GAAN</div>
                <div class="num" id="teller">412</div>
                <button class="btn" style="background:#ef4444; color:white;" onclick="change(-1)">-1</button>
                <button class="btn" style="background:#22c55e; color:white;" onclick="change(1)">+1</button>
            </div>
            <div class="card">
                <button class="btn" style="background:var(--geel); width:100%;" onclick="alert('Lekker gewerkt!')">🎉 VIER SUCCES</button>
            </div>
        </div>
    </div>
    <script>
        const lijst = document.getElementById('dockLijst');
        for (let i = 1; i <= 22; i++) {
            lijst.innerHTML += `<div class="dock"><b>DOCK ${i < 10 ? '0' + i : i}</b><input type="text" placeholder="Vrachtwagen..."></div>`;
        }
        setInterval(() => { document.getElementById('klok').textContent = new Date().toLocaleTimeString('nl-NL'); }, 1000);
        let n = 412;
        function change(v) { n += v; document.getElementById('teller').textContent = n; }
    </script>
</body>
</html>
