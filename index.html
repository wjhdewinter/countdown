<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>Final Countdown</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=2.1">
</head>
<body>
  <header class="topbar">
    <button class="iconTop" aria-label="Menu">☰</button>
    <div class="appTitle">Final Countdown</div>
    <button class="iconTop plus" id="addBtn" aria-label="Nieuwe countdown">+</button>
  </header>

  <main class="wrap">
    <section class="infoCard">
      <h2>Travel Countdown PRO</h2>
      <p>v8 fun features + v10 reis, hotel, weer, kaart en AI.</p>
      <div class="infoBtns">
        <button class="redPill">🎨 Thema</button>
        <button class="redPill">⚙️ AI</button>
      </div>
      <div class="installHint">Chrome-menu ⋮ → App installeren / Toevoegen aan startscherm.</div>
    </section>

    <div id="list"></div>
  </main>

  <dialog id="editor" class="editor">
    <form method="dialog" class="editorBox" id="editorForm">
      <h2>Countdown bewerken</h2>
      <label>Titel<input id="titleInput" autocomplete="off" placeholder="vakantie"></label>
      <label>Locatie<input id="placeInput" autocomplete="off" placeholder="Hurghada"></label>
      <label>Hotel / omschrijving<input id="hotelInput" autocomplete="off" placeholder="Moreno Horizon"></label>
      <label>Datum en tijd<input id="dateInput" type="datetime-local"></label>
      <div class="editorActions">
        <button value="cancel" class="greyBtn">Annuleren</button>
        <button id="saveBtn" value="default" class="saveBtn">Opslaan</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast" role="status"></div>
  <script src="app.js?v=2.1"></script>
</body>
</html>
